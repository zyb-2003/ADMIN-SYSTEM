[build]
  command = "npm run build"
  publish = "dist"

# 强制所有静态文件正确返回
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "application/javascript"

# 先处理静态资源
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200
  force = true

# 再处理所有其他路由
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true