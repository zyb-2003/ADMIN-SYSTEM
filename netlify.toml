[build]
  command = "npm run build"
  publish = "dist"

# 处理静态资源 - 必须放在最前面！
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200
  force = true

# 处理根路径
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200
  force = true

# 处理所有前端路由
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true